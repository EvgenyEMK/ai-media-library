# Windows packaging (Phase 1). See AGENTS.md / root docs for release process.
# https://www.electron.build/configuration/configuration

appId: com.emk.aimedialibrary
productName: AI Media Library
copyright: Copyright © EMK contributors

# GitHub Releases provider for electron-updater (requires published `latest.yml` + installer per release).
publish:
  provider: github
  owner: EMK-solutions
  repo: ai-media-library

directories:
  output: release/artifacts
  buildResources: build-resources

# PNG/ICO; electron-builder generates platform icons from this when needed.
icon: build-resources/app-icon.png

# Native addons are rebuilt for Electron in `pnpm run rebuild:native` before packaging.
npmRebuild: false

files:
  - dist-electron/**/*
  - dist-renderer/**/*
  - package.json
  # Exclude caches, sourcemaps, and non-runtime package content.
  - "!**/*.map"
  - "!**/node_modules/**/.cache/**"
  - "!**/node_modules/.ignored/**/.cache/**"
  - "!**/node_modules/**/{test,tests,__tests__,docs,doc,example,examples}/**"

asar: true
extraResources:
  - from: build-resources/app-icon.png
    to: app-icon.png
  - from: build-resources/app-icon.ico
    to: app-icon.ico
asarUnpack:
  - "**/*.node"
  - "**/node_modules/exiftool-vendored/**/*"
  - "**/node_modules/better-sqlite3/**/*.node"
  - "**/node_modules/onnxruntime-node/**/*"

afterPack: scripts/electron-builder-after-pack.mjs

win:
  icon: build-resources/app-icon.ico
  # Unsigned local builds: avoid winCodeSign extraction, which requires symlink
  # privileges on Windows. Runtime app details provide the taskbar icon instead.
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-Windows-${arch}.${ext}"

forceCodeSigning: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  include: build-resources/installer-user-data.nsh
