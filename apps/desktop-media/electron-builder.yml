# Windows (NSIS) and Linux (AppImage + deb). Build Linux artifacts on Linux or WSL2, not by cross-compiling from Windows.
# https://www.electron.build/configuration/configuration

appId: com.emk.aimedialibrary
productName: AI Media Library
copyright: Copyright © EMK contributors

# GitHub Releases provider for electron-updater (feed URL in packaged app).
# CI and local `dist:*` scripts pass `--publish never` so builds only write artifacts under
# release/artifacts. Upload to GitHub Releases is a separate release step (GH_TOKEN required).
# Each GitHub Release must include update metadata for every shipped OS:
# - Windows: `latest.yml` + NSIS `.exe` (and `.exe.blockmap` when publishing via electron-builder).
# - Linux (AppImage / generic): `latest-linux.yml` + `.AppImage` (and `.deb` when deb is a target), plus blockmaps if used.
publish:
  provider: github
  owner: EMK-solutions
  repo: ai-media-library

directories:
  output: release/artifacts
  buildResources: build-resources

# PNG/ICO; electron-builder generates platform icons from this when needed.
icon: build-resources/app-icon.png

# Native addons are rebuilt for Electron in `pnpm run rebuild:native` before packaging.
npmRebuild: false

files:
  - dist-electron/**/*
  - dist-renderer/**/*
  - package.json
  # Exclude caches, sourcemaps, and non-runtime package content.
  - "!**/*.map"
  - "!**/node_modules/**/.cache/**"
  - "!**/node_modules/.ignored/**/.cache/**"
  - "!**/node_modules/**/{test,tests,__tests__,docs,doc,example,examples}/**"

asar: true
extraResources:
  - from: build-resources/app-icon.png
    to: app-icon.png
  - from: build-resources/app-icon.ico
    to: app-icon.ico
asarUnpack:
  - "**/*.node"
  - "**/node_modules/exiftool-vendored/**/*"
  # ExifTool's platform binary lives in a sibling optional package; videos hang
  # in packaged builds if this package is omitted or left inside app.asar.
  - "**/node_modules/exiftool-vendored.{exe,pl}/**/*"
  - "**/node_modules/better-sqlite3/**/*.node"
  - "**/node_modules/onnxruntime-node/**/*"
  # Sharp uses platform packages under @img. The native .node can be unpacked
  # by the generic rule above, but libvips ships as .so files that dlopen
  # cannot read from app.asar.
  - "**/node_modules/@img/sharp-*/**/*"
  # Transformers.js loads ONNX/tokenizer assets at runtime; keeping this inside app.asar
  # breaks vision warmup on Linux packaged builds (immediate semantic-index failure).
  - "**/@huggingface/transformers/**"

afterPack: scripts/electron-builder-after-pack.mjs

win:
  icon: build-resources/app-icon.ico
  # Unsigned local builds: avoid winCodeSign extraction, which requires symlink
  # privileges on Windows. Runtime app details provide the taskbar icon instead.
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-Windows-${arch}.${ext}"

forceCodeSigning: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  include: build-resources/installer-user-data.nsh

linux:
  icon: build-resources/app-icon.png
  vendor: EMK contributors
  maintainer: EMK contributors <ai-media-library@noreply.github.com>
  synopsis: Local AI media library
  description: Desktop-first local photo library with semantic search and offline AI (Electron).
  category: Graphics
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: "${productName}-${version}-Linux-${arch}.${ext}"
