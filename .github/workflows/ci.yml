name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  typecheck-and-tests:
    name: Typecheck and Unit Tests (no E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests (excluding E2E)
        run: pnpm test

  desktop-e2e-smoke:
    name: Desktop E2E Smoke (no AI model deps)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @emk/desktop-media exec playwright install chromium

      - name: Run desktop E2E smoke subset
        run: pnpm --filter @emk/desktop-media test:e2e:ci-smoke

  desktop-linux-dist:
    name: Desktop Linux distributable (AppImage + deb)
    # Build installers only on main (not on dev/PR) to save CI time; remove this `if` to build on every push.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux build and packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 fakeroot

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux distributables
        run: pnpm --filter @emk/desktop-media run dist:linux

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-release-artifacts
          path: apps/desktop-media/release/artifacts/**
          if-no-files-found: error

  desktop-windows-dist:
    name: Desktop Windows distributable (NSIS)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows distributable
        run: pnpm --filter @emk/desktop-media run dist:win

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-release-artifacts
          path: apps/desktop-media/release/artifacts/**
          if-no-files-found: error
